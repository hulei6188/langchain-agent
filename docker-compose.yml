services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lingshu_agent
      POSTGRES_USER: lingshu
      POSTGRES_PASSWORD: lingshu
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  milvus:
    image: milvusdb/milvus:v2.5.4
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_USE_EMBED: "true"
      COMMON_STORAGETYPE: local
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      DATABASE_URL: postgresql+psycopg2://lingshu:lingshu@postgres:5432/lingshu_agent
      REDIS_URL: redis://redis:6379/0
      LINGSHU_VECTOR_BACKEND: milvus
      MILVUS_URI: http://milvus:19530
      MILVUS_COLLECTION: lingshu_chunks
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-qwen-plus}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-v4}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - milvus

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5174:5174"
    depends_on:
      - api

volumes:
  postgres_data:
  milvus_data:

